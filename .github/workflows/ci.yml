name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build

      - name: Set up Wayland compositor
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y sway
          mkdir -p /tmp/xdg
          export XDG_RUNTIME_DIR=/tmp/xdg
          WLR_BACKENDS=headless sway &
          sleep 2
          echo "XDG_RUNTIME_DIR=/tmp/xdg" >> "$GITHUB_ENV"
          echo "WAYLAND_DISPLAY=wayland-1" >> "$GITHUB_ENV"

      - run: cargo test -- --test-threads=1 --ignored

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
